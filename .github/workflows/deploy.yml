# Bitleader Dashboard: GitHub Pages 자동 배포 워크플로우
# - 매일 UTC 00:00 (KST 09:00) 자동 재빌드 (GitHub 최신 저장소 반영)
# - main 브랜치 push 시 재빌드
# - 수동 트리거 지원 (workflow_dispatch)
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *' # 매일 UTC 자정 (KST 09:00)
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 충돌 방지: 같은 그룹은 순차 실행 (진행 중 배포는 취소)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        # cross-repo (bitleader-dev/*) 호출에는 사용자 PAT 를 사용한다.
        # secrets.GITHUB_TOKEN 은 워크플로우 저장소에만 권한이 발급되어,
        # 다른 저장소 응답이 GitHub origin 의 공유 캐시에서 stale 로 서빙되며
        # schedule 빌드(UTC 00:00)에서 새 release/README 가 누락되는 사례가 관측됨.
        # secrets.PAT_GH_API 에 repo:read 권한 fine-grained PAT 를 등록해 사용한다.
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_GH_API }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
